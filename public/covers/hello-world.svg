<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a1c71"/>
      <stop offset="0.55" stop-color="#d76d77"/>
      <stop offset="1" stop-color="#ffaf7b"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#base)"/>
  <g filter="url(#soft)" opacity="0.85">
    <circle cx="380" cy="260" r="240" fill="#ffd28f"/>
    <circle cx="1180" cy="300" r="280" fill="#e0567f"/>
    <circle cx="900" cy="720" r="300" fill="#7b2ff7"/>
    <circle cx="1350" cy="760" r="180" fill="#ffb08a"/>
  </g>
  <circle cx="1140" cy="250" r="90" fill="#fff3d6" opacity="0.9"/>
  <rect width="1600" height="900" filter="url(#grain)" opacity="0.05"/>
</svg>
